name: Build and Release cypy

on:
  push:
    tags:
      - 'v*' # Trigger when pushing tags like v1.0.0, v0.1.0
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Configure swap space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled:"
          free -h

      - name: Configure page file (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # Create 10GB page file on D: drive for compiler memory
          $pf = Get-CimInstance -ClassName Win32_PageFileSetting -ErrorAction SilentlyContinue
          if ($pf) { Remove-CimInstance -InputObject $pf }
          New-CimInstance -ClassName Win32_PageFileSetting -Property @{Name="D:\pagefile.sys"; InitialSize=10240; MaximumSize=10240} -ErrorAction SilentlyContinue
          # Also disable automatic managed pagefile and set current
          $cs = Get-CimInstance Win32_ComputerSystem
          Set-CimInstance -InputObject $cs -Property @{AutomaticManagedPagefile=$false}
          Write-Host "Page file configured on D: drive (10GB)"

      - name: Run Build Script
        run: python build.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.os }}
          path: releases/*.zip

  release:
    name: Create Release and Upload Assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Organize Release Files
        run: |
          mkdir -p release-files
          find downloaded-artifacts -name "*.zip" -exec cp {} release-files/ \;
          echo "Files to upload:"
          ls -lh release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: cypy ${{ github.ref_name }}
          generate_release_notes: true
          files: release-files/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
